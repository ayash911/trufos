name: AI Code Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Skip drafts and dependabot PRs
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.actor != 'dependabot[bot]') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '/review'))
    steps:
      - name: Run PR-Agent
        uses: Codium-ai/pr-agent@v0.34
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Provider: Google AI Studio (Gemini) via LiteLLM.
          # Requires the GEMINI_API_KEY repository secret to be set.
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Flash models are available on the Gemini API free tier (no billing
          # required). The previously configured gemini-3.x IDs do not exist and
          # returned 404 (NOT_FOUND).
          config.model: "gemini/gemini-2.5-flash"
          config.fallback_models: '["gemini/gemini-2.0-flash"]'
          # PR-Agent v0.34 does not know these models' token window; declare it
          # explicitly (Gemini Flash input window = 1,048,576 tokens).
          config.custom_model_max_tokens: "1048576"
          # To use OpenAI instead, uncomment:
          # OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          # OPENAI__API_BASE: ${{ secrets.OPENAI_API_BASE_URL }}
          # config.model: "gpt-4o"
          # To use Anthropic Claude instead, uncomment:
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # config.model: "anthropic/claude-sonnet-4-5"

          # Automatically review every new / updated PR
          github_action_config.auto_review: "true"
          # Extend default PR actions to include synchronize (new commits)
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'
          # Automatically generate a PR description when none is provided
          github_action_config.auto_describe: "true"
          # Walk the diff and post concrete code suggestions (does not auto-approve/merge)
          github_action_config.auto_improve: "true"
          # Post suggestions as inline committable comments on the changed files
          # instead of a single summary table
          pr_code_suggestions.commitable_code_suggestions: "true"
          # Mark each automated review with the "Review effort x/5" labels
          pr_reviewer.enable_review_labels_effort: "true"

          # Review focus tailored to Trufos project conventions
          pr_reviewer.extra_instructions: |
            This is an Electron + React 19 + TypeScript desktop application called Trufos (a cross-platform REST client).
            Pay special attention to:
            - TypeScript strict mode: flag any use of `any`, missing return types, or unsafe type assertions
            - Electron IPC security: all IPC payloads must be validated with Zod; `nodeIntegration` must never be enabled
            - React best practices: only functional components, correct hook usage, no unnecessary prop drilling
            - State management: shared state in Zustand stores (src/renderer/state/), Immer for nested mutations
            - Error handling: typed error classes, Winston for main-process logging, sonner toasts for user-facing errors in the renderer
            - Styling: Tailwind CSS only, use cn() helper for conditional classes, no inline styles
            - Test coverage: services, Zustand stores, and utility functions must have Vitest tests

